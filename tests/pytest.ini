[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
markers =
    p0: P0 priority tests (core functionality)
    p1: P1 priority tests (important)
    p2: P2 priority tests (nice to have)
    slow: Slow running tests
